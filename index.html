<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Lucky 5 - Premium Number Generator</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="app-container">
    <header>
      <div class="theme-toggle-container">
        <button id="theme-toggle" aria-label="Toggle Dark/Light Mode">
          <span class="icon-moon">🌙</span>
          <span class="icon-sun">☀️</span>
        </button>
      </div>
      <h1>Lotto <span class="highlight">Lucky 5</span></h1>
      <p>Your premium gateway to luck</p>
    </header>

    <main id="lotto-display">
      <!-- 5 Game slots will be generated here -->
      <div class="game-placeholder">Click the button to generate your lucky numbers</div>
    </main>

    <div class="actions">
      <button id="generate-btn">
        <span class="btn-text">Generate Numbers</span>
        <span class="btn-glow"></span>
      </button>
    </div>

    <section class="partnership-section">
      <div class="card form-card">
        <h2>Partnership <span class="highlight">Inquiry</span></h2>
        <p>Interested in working together? Send us a message.</p>
        
        <form action="https://formspree.io/f/xzdodjko" method="POST">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>
          </div>
          
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="_replyto" placeholder="your@email.com" required>
          </div>
          
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="4" placeholder="Tell us about your project..." required></textarea>
          </div>
          
          <button type="submit" class="submit-btn">Send Message</button>
        </form>
      </div>
    </section>

    <footer>
      <p>For entertainment purposes only. Play responsibly.</p>
    </footer>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
